{% load static %}
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yêu cầu nạp tiền</title>
    <link rel="stylesheet" href="{% static 'css/topup_request.css' %}" />
  </head>
  <body>
    <header class="topup-header">
      <div class="container header-wrap">
        <div class="logo">Sales Management</div>

        <nav class="nav">
          <a href="{% url 'home' %}">Trang chủ</a>
          <a href="{% url 'wallet' %}">Ví tiền</a>
          <a href="{% url 'logout' %}">Đăng xuất</a>
        </nav>
      </div>
    </header>

    <main class="container topup-page">
      <section class="topup-card">
        <h1>Gửi yêu cầu nạp tiền</h1>
        <p>Nhập số tiền bạn muốn nạp và ghi chú nếu cần.</p>

        {% if messages %}
        <div class="messages">
          {% for message in messages %}
          <div class="message {{ message.tags }}">{{ message }}</div>
          {% endfor %}
        </div>
        {% endif %}

        <form method="post" class="topup-form">
          {% csrf_token %}

          <div class="form-group">
            <label for="amount">Số tiền nạp</label>
            <input
              type="text"
              id="amount"
              name="amount"
              inputmode="numeric"
              placeholder="Ví dụ: 50.000"
              required
            />
          </div>

          <div class="form-group">
            <label for="note">Ghi chú</label>
            <textarea
              id="note"
              name="note"
              rows="5"
              placeholder="Ví dụ: Chuyển khoản lúc 8h sáng"
            ></textarea>
          </div>

          <div class="form-actions">
            <a href="{% url 'wallet' %}" class="btn btn-secondary"
              >Quay lại ví</a
            >
            <button type="submit" class="btn btn-primary">Gửi yêu cầu</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>

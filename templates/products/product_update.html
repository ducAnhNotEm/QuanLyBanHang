{% load static %}
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sửa sản phẩm</title>
    <link rel="stylesheet" href="{% static 'css/product_create.css' %}" />
  </head>
  <body>
    <header class="admin-header">
      <div class="container header-wrap">
        <div class="brand">
          <span class="brand-main">Sales Management</span>
          <span class="brand-sub">Admin Panel</span>
        </div>

        <nav class="admin-nav">
          <a href="{% url 'home' %}">Trang chủ</a>
          <a href="{% url 'product_list' %}">Danh sách sản phẩm</a>
          <a href="{% url 'logout' %}">Đăng xuất</a>
        </nav>
      </div>
    </header>

    <main class="container page-wrap">
      <section class="page-intro">
        <h1>Sửa sản phẩm</h1>
        <p>Cập nhật thông tin sản phẩm trong hệ thống.</p>
      </section>

      <section class="form-card">
        <div class="form-card-header">
          <h2>Thông tin cần chỉnh sửa</h2>
          <p>Điều chỉnh thông tin và lưu lại.</p>
        </div>

        <form method="post" enctype="multipart/form-data" class="product-form">
          {% csrf_token %}

          <div class="form-grid">
            <div class="form-group full-width">
              <label for="productName">Tên sản phẩm</label>
              <input
                type="text"
                id="productName"
                name="productName"
                value="{{ product.productName }}"
                required
              />
            </div>

            <div class="form-group full-width">
              <label for="description">Mô tả sản phẩm</label>
              <textarea id="description" name="description" rows="5">
{{ product.description }}</textarea
              >
            </div>

            <div class="form-group">
              <label for="price">Giá bán</label>
              <input
                type="number"
                step="0.01"
                id="price"
                name="price"
                value="{{ product.price }}"
                required
              />
            </div>

            <div class="form-group">
              <label for="stockQuantity">Số lượng tồn kho</label>
              <input
                type="number"
                id="stockQuantity"
                name="stockQuantity"
                value="{{ product.stockQuantity }}"
                required
              />
            </div>

            <div class="form-group full-width">
              <label for="image">Hình ảnh sản phẩm mới</label>
              <input type="file" id="image" name="image" accept="image/*" />
              <small
                >Nếu không chọn ảnh mới thì hệ thống giữ nguyên ảnh cũ.</small
              >
            </div>
          </div>

          <div class="form-actions">
            <a href="{% url 'product_list' %}" class="btn btn-secondary"
              >Quay lại</a
            >
            <button type="submit" class="btn btn-primary">
              Cập nhật sản phẩm
            </button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
